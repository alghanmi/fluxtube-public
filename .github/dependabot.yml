version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    groups:
      dev-dependencies:
        dependency-type: 'development'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'

  - package-ecosystem: 'npm'
    directory: '/workers/sync'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: 'npm'
    directory: '/scripts'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(actions)'

  - package-ecosystem: 'terraform'
    directory: '/infrastructure/terraform/environments/production'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(terraform)'

  - package-ecosystem: 'terraform'
    directory: '/infrastructure/terraform/_modules/fluxtube-environment'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(terraform)'
